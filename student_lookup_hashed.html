<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Student Lookup (hashed)</title>
<style>
  :root{font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f7fafc;color:#0f172a;padding:20px}
  .card{width:min(900px,95vw);background:white;padding:28px;border-radius:12px;box-shadow:0 6px 30px rgba(2,6,23,0.08);max-height:90vh;overflow-y:auto}
  .search-row{display:flex;gap:8px}
  input[type="search"]{flex:1;padding:12px 14px;border-radius:8px;border:1px solid #e6e9ef;font-size:16px}
  button{padding:10px 14px;border-radius:8px;border:0;background:#0ea5a4;color:white;font-weight:600;cursor:pointer}
  table{width:100%;border-collapse:collapse;margin-top:18px}
  th,td{text-align:left;padding:10px;border-bottom:1px solid #eef2f7;word-wrap:break-word;overflow-wrap:break-word}
  .muted{color:#64748b;font-size:13px}
  .hidden{display:none}
  .notfound{margin-top:12px;color:#ef4444;font-weight:600}
  .section-header{background:#f0f4f8;font-weight:700;padding:12px 10px;border-bottom:2px solid #cbd5e1;border-top:16px solid transparent;font-size:13px;text-transform:uppercase;letter-spacing:0.5px}
</style>
</head>
<body>
<div class="card" role="main">
  <div class="muted">Search by Student ID.</div>
  <div class="search-row" style="margin-top:12px">
    <input id="q" type="search" placeholder="Enter 8-digit Student ID and press Enter" aria-label="Student ID">
    <button id="btn">Search</button>
  </div>
  <div id="resultArea" class="hidden" aria-live="polite">
    <table id="resultTable" role="table">
      <thead><tr><th>Field</th><th>Value</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
  <div id="notfound" class="notfound hidden">No matching student ID found.</div>
  </div>

<script>
let dataset = [];

// Load grades.json on page load
async function loadDataset() {
  try {
    const response = await fetch('grades.json');
    dataset = await response.json();
  } catch (error) {
    console.error('Failed to load grades.json:', error);
    notfound.textContent = 'Error loading student data. Please refresh the page.';
    notfound.classList.remove('hidden');
  }
}

// Initialize dataset when page loads
document.addEventListener('DOMContentLoaded', loadDataset);

// Helper function: convert ArrayBuffer to hex
function buf2hex(buffer) {
  return Array.prototype.map.call(new Uint8Array(buffer), x => ('00' + x.toString(16)).slice(-2)).join('');
}

// Hash input using SubtleCrypto
async function sha256hex(message) {
  const enc = new TextEncoder();
  const data = enc.encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return buf2hex(hashBuffer);
}

const q = document.getElementById('q');
const btn = document.getElementById('btn');
const resultArea = document.getElementById('resultArea');
const resultBody = document.getElementById('resultBody');
const notfound = document.getElementById('notfound');

// Field name mappings and grouping
const fieldConfig = {
  'Student Information': {
    fields: ['Display Name', 'Display ID', 'Total Percentage', 'DLSU GPA Equivalent', 'Section Name'],
    mapping: {
      'Display Name': 'Name',
      'Display ID': 'Student ID'
    }
  },
  'Insight Papers': {
    fields: ['Module 1', 'Module 2', 'Module 3', 'Insight Papers 45% ', '% Equivalent Insight Papers']
  },
  'Class Participation': {
    fields: ['Authenticity Scale', 'OCEAN Activity (class activity)', 'Anthropological Views of the Self (class activity)', 'Physical Self (discussion thread)', 'Economic Self (discussion thread)', 'Psychological Flexibility', 'Virtues and Character Strengths (VIA Survey)', 'Index Card (additional point)', 'Class Participation 15%', '% Equivalent Class Participation']
  },
  'Final Output': {
    fields: ['Final Output 30%', '% Equivalent FInal Output']
  },
  'Peer Evaluation': {
    fields: ['Peer Evaluation 10%', '% Equivalent Peer evaluation']
  }
};

async function doSearch() {
  const v = q.value.trim();
  resultBody.innerHTML = '';
  resultArea.classList.add('hidden');
  notfound.classList.add('hidden');
  if (!v) return;
  // basic validation: require digits, reasonable length
  if (!/^[0-9]{6,12}$/.test(v)) {
    notfound.textContent = 'Please enter a numeric student ID (6–12 digits).';
    notfound.classList.remove('hidden');
    return;
  }
  const h = await sha256hex(v);
  const hits = dataset.filter(d => d['Hash ID'] === h);
  if (hits.length === 0) {
    notfound.textContent = 'No matching student ID found.';
    notfound.classList.remove('hidden');
    return;
  }
  
  // populate table with grouped sections
  for (const record of hits) {
    for (const [section, config] of Object.entries(fieldConfig)) {
      // Add section header
      const headerRow = document.createElement('tr');
      headerRow.innerHTML = `<td colspan="2" class="section-header">${section}</td>`;
      resultBody.appendChild(headerRow);
      
      // Add fields in this section
      for (const fieldKey of config.fields) {
        if (fieldKey in record) {
          const tr = document.createElement('tr');
          const displayName = (config.mapping && config.mapping[fieldKey]) || fieldKey;
          const value = record[fieldKey];
          tr.innerHTML = `<td><strong>${displayName}</strong></td><td>${value}</td>`;
          resultBody.appendChild(tr);
        }
      }
    }
  }
  resultArea.classList.remove('hidden');
}

btn.addEventListener('click', doSearch);
q.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
