<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Student Lookup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
:root{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --bg:#f6f7f9;
  --card:#ffffff;
  --border:#e6e6e6;
  --text:#2f2f2f;
  --muted:#8a8a8a;
  --accent:#1e3a8a;
}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:16px;
}

.container{
  width:100%;
  max-width:720px;
}

.card{
  background:var(--card);
  border-radius:12px;
  padding:16px;
  box-shadow:0 4px 16px rgba(0,0,0,0.05);
}

/* SEARCH */
.search{
  display:flex;
  gap:8px;
  margin-bottom:16px;
}

.search input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:16px;
}

.search button{
  padding:12px 14px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

/* HEADER */
.student-header{
  margin-bottom:16px;
}

.student-name{
  font-size:18px;
  font-weight:600;
}

.student-meta{
  font-size:13px;
  color:var(--muted);
}

.student-grade{
  margin-top:8px;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}

/* SECTION */
.section{
  margin-top:16px;
}

.section-title{
  font-size:12px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:6px;
}

/* ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
  font-size:14px;
}

.item:last-child{
  border-bottom:none;
}

.label{
  color:var(--muted);
}

.value{
  font-weight:500;
}

/* BUTTON */
.download{
  margin-top:16px;
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}

/* BREAKDOWN */
.breakdown{
  margin-top:20px;
  padding-top:12px;
  border-top:1px solid var(--border);
}

.break-row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:6px;
}

.total{
  font-weight:700;
  color:var(--accent);
  margin-top:8px;
}

/* STATES */
.hidden{display:none;}
.error{
  color:#d63031;
  font-size:14px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    
    <div class="search">
      <input id="q" type="search" placeholder="Enter Student ID">
      <button id="btn"><i class="bi bi-search"></i></button>
    </div>

    <div id="result" class="hidden"></div>
    <div id="error" class="error hidden"></div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let dataset = [];

async function loadDataset() {
  const res = await fetch('grades.json');
  dataset = await res.json();
}
document.addEventListener('DOMContentLoaded', loadDataset);

function buf2hex(buffer) {
  return Array.prototype.map.call(new Uint8Array(buffer), x => ('00' + x.toString(16)).slice(-2)).join('');
}

async function sha256hex(message) {
  const data = new TextEncoder().encode(message);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return buf2hex(hash);
}

function format(val){
  const num = parseFloat(val);
  return isNaN(num) ? val : num.toFixed(2);
}

const fieldConfig = {
  "Insight Papers": {weight:30, raw:"Insight Papers / 60", max:60, icon:"bi-pencil"},
  "Class Participation": {weight:20, raw:"Class Participation / 7", max:7, icon:"bi-chat"},
  "Final Output Proposal": {weight:10, raw:"Final Output Proposal / 16", max:16, icon:"bi-lightbulb"},
  "Final Output": {weight:30, raw:"Final Output / 28", max:28, icon:"bi-check-circle"},
  "Peer Evaluation": {weight:10, raw:"Peer Evaluation / 16", max:16, icon:"bi-star"}
};

function generate(record){

  let html = `
    <div class="student-header">
      <div class="student-name">${record["Display Name"]}</div>
      <div class="student-meta">${record["Display ID"]} • ${record["Section Name"]}</div>
      <div class="student-grade">${format(record["Total Percentage"])}% • GPA ${record["DLSU GPA Equivalent"]}</div>
    </div>
  `;

  for (const [section, cfg] of Object.entries(fieldConfig)){
    const raw = record[cfg.raw];
    if (!raw) continue;

    html += `
      <div class="section">
        <div class="section-title"><i class="bi ${cfg.icon}"></i>${section}</div>
        <div class="item">
          <div class="label">Score</div>
          <div class="value">${raw}/${cfg.max}</div>
        </div>
        <div class="item">
          <div class="label">Weight</div>
          <div class="value">${cfg.weight}%</div>
        </div>
      </div>
    `;
  }

  html += `<button class="download" onclick="download()">Download Report</button>`;

  // breakdown
  let total = 0;
  html += `<div class="breakdown">`;

  for (const [section, cfg] of Object.entries(fieldConfig)){
    const raw = parseFloat(record[cfg.raw]);
    if (!raw) continue;

    const pct = (raw/cfg.max)*100;
    const weighted = pct * cfg.weight / 100;
    total += weighted;

    html += `
      <div class="break-row">
        <span>${section}</span>
        <span>${weighted.toFixed(2)}%</span>
      </div>
    `;
  }

  html += `<div class="break-row total">Total: ${total.toFixed(2)}%</div></div>`;

  return html;
}

async function search(){
  const v = document.getElementById('q').value.trim();
  const result = document.getElementById('result');
  const error = document.getElementById('error');

  result.classList.add('hidden');
  error.classList.add('hidden');

  if (!v) return;

  const h = await sha256hex(v);
  const rec = dataset.find(d => d["Hash ID"] === h);

  if (!rec){
    error.textContent = "No student found.";
    error.classList.remove('hidden');
    return;
  }

  result.innerHTML = generate(rec);
  result.classList.remove('hidden');
}

function download(){
  html2pdf().from(document.getElementById("result")).save();
}

document.getElementById('btn').onclick = search;
document.getElementById('q').addEventListener('keydown', e=>{
  if(e.key==="Enter") search();
});
</script>
</body>
</html>
