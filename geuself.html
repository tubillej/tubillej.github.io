<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Student Lookup (hashed)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f5f5f5;color:#37352f;padding:20px}
  .card{width:min(900px,95vw);background:white;padding:20px;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);max-height:90vh;overflow-y:auto}
  @media (min-width: 600px) {
    .card{padding:40px}
  }
  .search-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
  input[type="search"]{flex:1;min-width:200px;padding:10px 12px;border-radius:4px;border:1px solid #d9d9d9;font-size:16px;background:#fff;color:#37352f;transition:border 0.2s;-webkit-appearance:none}
  input[type="search"]:focus{outline:none;border-color:#a8a8a8}
  button{padding:10px 16px;border-radius:4px;border:1px solid #e0e0e0;background:#f5f5f5;color:#37352f;font-weight:500;cursor:pointer;font-size:14px;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  button:hover{background:#efefef;border-color:#ccc}
  button.secondary{border:1px solid #e0e0e0;margin-top:16px;width:100%;background:#fff;justify-content:center}
  button.secondary:hover{background:#f9f9f9}
  button i{font-size:16px}
  table{width:100%;border-collapse:collapse;margin-top:24px;font-size:14px}
  @media (max-width: 599px) {
    table{font-size:13px}
    thead{display:none}
    tbody{display:flex;flex-direction:column;gap:0}
    tr{display:flex;flex-direction:column;border:1px solid #eaeaea;border-radius:4px;margin-bottom:12px;padding:0;background:#fff}
    td{padding:12px;border:none;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
    td:last-child{border-bottom:none}
    td:before{content:attr(data-label);font-weight:600;color:#37352f;flex:0 0 45%;word-break:break-word;margin-right:8px}
    td strong{font-weight:600}
    .section-header{display:flex;justify-content:center;margin-bottom:12px;padding:12px;border-radius:4px;background:#fbfbfb;border:1px solid #eaeaea;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#7a7a7a;width:100%}
    .section-header i{margin-right:6px}
    .final-grade{font-size:16px}
  }
  @media (min-width: 600px) {
    th,td{padding:11px 12px}
  }
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid #eaeaea;word-wrap:break-word;overflow-wrap:break-word}
  td strong{font-weight:600;color:#37352f}
  .muted{color:#9a9a9a;font-size:14px;margin-bottom:16px}
  .hidden{display:none}
  .notfound{margin-top:12px;color:#d63031;font-weight:500;font-size:14px}
  .section-header{background:#fbfbfb;font-weight:600;padding:10px 8px;border-bottom:1px solid #eaeaea;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#7a7a7a}
  @media (min-width: 600px) {
    .section-header{padding:12px 12px}
  }
  .section-header i{margin-right:8px;color:#5a5a5a}
  .final-grade{font-weight:700;color:#1e3a8a;font-size:15px}
  .grading-breakdown{margin-top:32px;padding:16px;background:#ffffff;border-radius:4px;border:1px solid #e5e5e5}
  .grading-breakdown h3{margin:0 0 16px 0;font-size:12px;font-weight:600;color:#9a9a9a;text-transform:uppercase;letter-spacing:0.5px}
  .grading-breakdown ul{margin:0;padding:0;list-style:none}
  .grading-breakdown li{font-size:13px;color:#565656;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
  .grading-breakdown li:last-child{border-bottom:none}
  .grading-breakdown li .category{flex:1}
  .grading-breakdown li .metrics{display:flex;gap:24px;align-items:center;text-align:right}
  .grading-breakdown li .metric{display:flex;flex-direction:column;align-items:flex-end}
  .grading-breakdown li .metric-label{font-size:11px;color:#9a9a9a;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.3px}
  .grading-breakdown li .metric-value{font-size:13px;font-weight:600;color:#37352f}
  .grading-breakdown .total-row{margin-top:12px;padding-top:12px;border-top:2px solid #e0e0e0;font-weight:600;color:#1e3a8a}
  .grading-breakdown .total-row .metric-value{color:#1e3a8a;font-size:14px}
  @media (max-width: 599px) {
    .grading-breakdown{margin-top:20px;padding:12px}
    .grading-breakdown h3{font-size:11px;margin-bottom:12px}
    .grading-breakdown li{flex-direction:column;align-items:flex-start;padding:10px 0;gap:6px}
    .grading-breakdown li .category{font-weight:600;margin-bottom:4px}
    .grading-breakdown li .metrics{width:100%;justify-content:space-between;gap:12px}
    .grading-breakdown li .metric{flex:1;align-items:flex-end}
    .grading-breakdown li .metric-label{font-size:10px}
    .grading-breakdown li .metric-value{font-size:12px}
    .grading-breakdown .total-row{flex-direction:row;align-items:center;padding:10px 0}
    .grading-breakdown .total-row .category{font-size:14px}
    .grading-breakdown .total-row .metric-value{font-size:13px}
  }
</style>
</head>
<body>
<div class="card" role="main">
  <div class="muted">Search by Student ID.</div>
  <div class="search-row" style="margin-top:12px">
    <input id="q" type="search" placeholder="Enter 8-digit Student ID and press Enter" aria-label="Student ID">
    <button id="btn">Search</button>
  </div>
  <div id="resultArea" class="hidden" aria-live="polite">
    <table id="resultTable" role="table">
      <thead><tr><th>Field</th><th>Value</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
    <div id="gradingBreakdown" class="grading-breakdown"></div>
  </div>
  <div id="notfound" class="notfound hidden">No matching student ID found.</div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
let dataset = [];

// Load grades.json on page load
async function loadDataset() {
  try {
    const response = await fetch('grades.json');
    dataset = await response.json();
  } catch (error) {
    console.error('Failed to load grades.json:', error);
    notfound.textContent = 'Error loading student data. Please refresh the page.';
    notfound.classList.remove('hidden');
  }
}

// Initialize dataset when page loads
document.addEventListener('DOMContentLoaded', loadDataset);

// Helper function: convert ArrayBuffer to hex
function buf2hex(buffer) {
  return Array.prototype.map.call(new Uint8Array(buffer), x => ('00' + x.toString(16)).slice(-2)).join('');
}

// Hash input using SubtleCrypto
async function sha256hex(message) {
  const enc = new TextEncoder();
  const data = enc.encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return buf2hex(hashBuffer);
}

// Format percentage values to 2 decimal places
function formatValue(fieldName, value) {
  if (fieldName.includes('% Equivalent') || fieldName.includes('Total Percentage')) {
    const num = parseFloat(value);
    if (!isNaN(num)) {
      return num.toFixed(2);
    }
  }
  return value;
}

// Format raw scores to show as value/max (e.g., 30/60)
function formatRawScore(fieldName, value) {
  const match = fieldName.match(/\s*\/\s*(\d+)$/);
  if (match) {
    const maxScore = match[1];
    return `${value}/${maxScore}`;
  }
  return value;
}

// Check if this is a final grade field
function isFinalGrade(fieldName) {
  return fieldName === 'DLSU GPA Equivalent' || fieldName === 'Total Percentage';
}

const q = document.getElementById('q');
const btn = document.getElementById('btn');
const resultArea = document.getElementById('resultArea');
const resultBody = document.getElementById('resultBody');
const notfound = document.getElementById('notfound');

// Field name mappings and grouping
const fieldConfig = {
  'Student Information': {
    fields: ['Display Name', 'Display ID', 'Total Percentage', 'DLSU GPA Equivalent', 'Section Name'],
    mapping: {
      'Display Name': 'Name',
      'Display ID': 'Student ID'
    },
    icon: 'bi-person-badge'
  },
  'Insight Papers': {
    fields: ['Module 1', 'Module 2', 'Module 3', 'Insight Papers / 60', '% Equivalent Insight Papers'],
    mapping: {
      'Insight Papers / 60': 'Insight Papers'
    },
    icon: 'bi-pencil-square',
    weight: 30,
    rawScoreField: 'Insight Papers / 60',
    maxScore: 60
  },
  'Class Participation': {
    fields: ['Authenticity Scale', 'OCEAN Activity (class activity)', 'Anthropological Views of the Self (class activity)', 'Physical Self (discussion thread)', 'Economic Self (discussion thread)', 'Psychological Flexibility', 'Virtues and Character Strengths (VIA Survey)', 'Index Card (additional point)', 'Class Participation / 7', '% Equivalent Class Participation'],
    mapping: {
      'Class Participation / 7': 'Class Participation'
    },
    icon: 'bi-chat-dots',
    weight: 20,
    rawScoreField: 'Class Participation / 7',
    maxScore: 7
  },
  'Final Output Proposal': {
    fields: ['Final Output Proposal / 16', '% Equivalent'],
    mapping: {
      'Final Output Proposal / 16': 'Final Output Proposal'
    },
    icon: 'bi-lightbulb',
    weight: 10,
    rawScoreField: 'Final Output Proposal / 16',
    maxScore: 16
  },
  'Final Output': {
    fields: ['Final Output / 28', '% Equivalent FInal Output'],
    mapping: {
      'Final Output / 28': 'Final Output'
    },
    icon: 'bi-check-circle',
    weight: 30,
    rawScoreField: 'Final Output / 28',
    maxScore: 28
  },
  'Peer Evaluation': {
    fields: ['Peer Evaluation / 16', '% Equivalent Peer evaluation'],
    mapping: {
      'Peer Evaluation / 16': 'Peer Evaluation'
    },
    icon: 'bi-star',
    weight: 10,
    rawScoreField: 'Peer Evaluation / 16',
    maxScore: 16
  }
};

async function downloadGradeReport() {
  const element = resultArea;
  const opt = {
    margin: [10, 10],
    filename: 'grade_report.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };
  
  // Generate and download PDF
  await html2pdf().set(opt).from(element).save();
}

function generateGradingBreakdown(record) {
  let breakdownHTML = '<h3>Grading Breakdown</h3>';
  breakdownHTML += `
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; padding: 8px 0; border-bottom: 2px solid #e0e0e0; font-weight: 600; color: #7a7a7a;">
      <div style="flex: 1;">Category</div>
      <div style="display: flex; gap: 24px; align-items: center; text-align: right;">
        <div style="width: 100px;">Raw Score</div>
        <div style="width: 80px;">Weight</div>
        <div style="width: 120px;">Weighted</div>
      </div>
    </div>
  `;
  breakdownHTML += '<ul>';
  let totalWeightedScore = 0;
  
  for (const [section, config] of Object.entries(fieldConfig)) {
    // Skip non-evaluated sections
    if (!config.weight || !config.rawScoreField || !config.maxScore) continue;
    
    if (config.rawScoreField in record) {
      const rawScore = parseFloat(record[config.rawScoreField]);
      const maxScore = config.maxScore;
      const percentage = (rawScore / maxScore) * 100;
      const weight = config.weight;
      const weightedScore = (percentage * weight) / 100;
      
      breakdownHTML += `
        <li>
          <div class="category">${section}</div>
          <div class="metrics">
            <div class="metric" style="min-width: 100px;">
              <div class="metric-value">${rawScore}/${maxScore}</div>
            </div>
            <div class="metric" style="min-width: 80px;">
              <div class="metric-value">${weight}%</div>
            </div>
            <div class="metric" style="min-width: 120px;">
              <div class="metric-value">${weightedScore.toFixed(2)}%</div>
            </div>
          </div>
        </li>
      `;
      
      totalWeightedScore += weightedScore;
    }
  }
  
  breakdownHTML += `
    <li class="total-row">
      <div class="category">Total</div>
      <div class="metrics">
        <div class="metric" style="min-width: 300px; text-align: right;">
          <div class="metric-value" style="font-size:14px">${totalWeightedScore.toFixed(2)}%</div>
        </div>
      </div>
    </li>
  </ul>`;
  
  return breakdownHTML;
}

async function doSearch() {
  const v = q.value.trim();
  resultBody.innerHTML = '';
  resultArea.classList.add('hidden');
  notfound.classList.add('hidden');
  if (!v) return;
  // basic validation: require digits, reasonable length
  if (!/^[0-9]{6,12}$/.test(v)) {
    notfound.textContent = 'Please enter a numeric student ID (6–12 digits).';
    notfound.classList.remove('hidden');
    return;
  }
  const h = await sha256hex(v);
  const hits = dataset.filter(d => d['Hash ID'] === h);
  if (hits.length === 0) {
    notfound.textContent = 'No matching student ID found.';
    notfound.classList.remove('hidden');
    return;
  }
  
  // populate table with grouped sections
  for (const record of hits) {
    let sectionCount = 0;
    for (const [section, config] of Object.entries(fieldConfig)) {
      sectionCount++;
      // Add section header
      const headerRow = document.createElement('tr');
      const iconClass = config.icon || 'bi-info-circle';
      headerRow.innerHTML = `<td colspan="2" class="section-header"><i class="bi ${iconClass}"></i> ${section}</td>`;
      resultBody.appendChild(headerRow);
      
      // Add fields in this section
      for (const fieldKey of config.fields) {
        if (fieldKey in record) {
          const tr = document.createElement('tr');
          const displayName = (config.mapping && config.mapping[fieldKey]) || fieldKey;
          let value = formatValue(displayName, record[fieldKey]);
          
          // Check if this is a raw score field (e.g., "Insight Paper (Raw Score) / 60")
          if (fieldKey.includes('(Raw Score)')) {
            value = formatRawScore(fieldKey, value);
          }
          
          if (isFinalGrade(displayName)) {
            tr.innerHTML = `<td data-label="Field"><strong>${displayName}</strong></td><td class="final-grade" data-label="Value">${value}</td>`;
          } else {
            tr.innerHTML = `<td data-label="Field"><strong>${displayName}</strong></td><td data-label="Value">${value}</td>`;
          }
          resultBody.appendChild(tr);
        }
      }
      
      // Add download button after first section
      if (sectionCount === 1) {
        const downloadRow = document.createElement('tr');
        downloadRow.innerHTML = `<td colspan="2"><button class="secondary" onclick="downloadGradeReport()"><i class="bi bi-download"></i> Download Grade Report</button></td>`;
        resultBody.appendChild(downloadRow);
      }
    }
    
    // Generate and display grading breakdown
    const gradingBreakdownDiv = document.getElementById('gradingBreakdown');
    gradingBreakdownDiv.innerHTML = generateGradingBreakdown(record);
  }
  resultArea.classList.remove('hidden');
}

btn.addEventListener('click', doSearch);
q.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
